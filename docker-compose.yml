version: "3.8"
services:
  database:
    container_name: postgres
    image: postgres
    environment:
      POSTGRES_DB: watchdog
      POSTGRES_USER: watchdog
      POSTGRES_PASSWORD: watchdog
    ports:
    - 5432:5432
    volumes:
    - database-data:/var/lib/postgresql/data/
volumes:
  database-data:
